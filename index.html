<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QashqAI Voice — ۱۰۰ کلمه قشقایی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E8453C; --sun:#FFD700; --green:#3DAA6B; --blue:#3A7BD5;
  --orange:#FF8C42; --purple:#9B59B6; --teal:#1ABC9C; --pink:#E91E8C;
  --dark:#2D1810; --sky:#FFF8E7;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Vazirmatn',sans-serif;background:var(--sky);min-height:100vh;overflow-x:hidden;}
.bg-pattern{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.bg-star{position:absolute;animation:floatUp linear infinite;opacity:.2;}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0);opacity:0;}10%{opacity:.2;}90%{opacity:.2;}100%{transform:translateY(-120px) rotate(360deg);opacity:0;}}
header{position:relative;z-index:10;background:linear-gradient(135deg,#E8453C,#B03028);box-shadow:0 6px 24px rgba(232,69,60,.4);}
.kilim{height:10px;background:repeating-linear-gradient(90deg,#FFD700 0,#FFD700 16px,#3DAA6B 16px,#3DAA6B 32px,#3A7BD5 32px,#3A7BD5 48px,#FFD700 48px,#FFD700 64px);}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;flex-wrap:wrap;gap:10px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-em{font-size:48px;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-8px) rotate(4deg);}}
.logo-text h1{font-size:22px;font-weight:900;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.2);}
.logo-text p{font-size:12px;color:rgba(255,255,255,.8);margin-top:2px;}
.stars-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.2);border-radius:50px;padding:10px 18px;font-size:18px;color:#fff;font-weight:700;}
.star-spin{animation:spin 3s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
nav{position:relative;z-index:10;background:#fff;display:flex;box-shadow:0 4px 16px rgba(0,0,0,.1);overflow-x:auto;}
.nb{flex:1;min-width:72px;border:none;background:transparent;padding:13px 8px 9px;font-family:'Vazirmatn',sans-serif;font-size:12px;font-weight:700;color:#aaa;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:4px solid transparent;}
.nb-em{font-size:22px;}
.nb.active,.nb:hover{color:#E8453C;border-bottom-color:#E8453C;background:#FFF5F5;}
main{position:relative;z-index:5;max-width:900px;margin:0 auto;padding:24px 14px 80px;}
.tc{display:none;}
.tc.active{display:block;animation:popIn .35s cubic-bezier(.17,.67,.3,1.3);}
@keyframes popIn{0%{opacity:0;transform:scale(.92);}100%{opacity:1;transform:scale(1);}}
.sec-head{text-align:center;margin-bottom:22px;}
.sec-head h2{font-size:26px;font-weight:900;color:#2D1810;}
.sec-head p{font-size:14px;color:#888;margin-top:5px;}
.cat-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;justify-content:center;}
.cat-btn{border:2px solid #ddd;background:#fff;border-radius:50px;padding:8px 16px;font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:700;color:#888;cursor:pointer;transition:.2s;}
.cat-btn.on{color:#fff;border-color:transparent;background:#E8453C;}
.lcard{background:#fff;border-radius:28px;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:32px 24px;text-align:center;margin-bottom:20px;transition:transform .2s;}
.lcard:hover{transform:translateY(-3px);}
.card-em{font-size:88px;display:block;margin-bottom:10px;animation:wiggle 3s ease-in-out infinite;}
@keyframes wiggle{0%,100%{transform:rotate(-3deg) scale(1);}50%{transform:rotate(3deg) scale(1.08);}}
.qword{font-size:54px;font-weight:900;color:#E8453C;line-height:1.1;margin-bottom:5px;}
.phonetic{font-size:18px;color:#bbb;margin-bottom:18px;font-style:italic;}
.trans-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:22px;}
.tp{display:flex;flex-direction:column;align-items:center;background:#f5f5f5;border-radius:14px;padding:9px 18px;min-width:90px;}
.tp .tl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#bbb;margin-bottom:3px;}
.tp .tw{font-size:18px;font-weight:700;color:#2D1810;}
.speak-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#3DAA6B,#27AE60);border:none;border-radius:50px;padding:14px 32px;color:#fff;font-family:'Vazirmatn',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(61,170,107,.5);transition:.2s;}
.speak-btn:hover{transform:scale(1.08);}
.nav-arr{display:flex;justify-content:center;align-items:center;gap:18px;margin-top:14px;}
.arr{width:52px;height:52px;border-radius:50%;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;box-shadow:0 4px 12px rgba(0,0,0,.15);font-weight:900;}
.arr.p{background:#FF8C42;color:#fff;}
.arr.n{background:#E8453C;color:#fff;}
.arr:hover{transform:scale(1.15);}
.wctr{font-size:15px;font-weight:700;color:#aaa;}
.mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
.mtile{background:#fff;border-radius:16px;padding:13px 8px;text-align:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.07);transition:.2s;border:2px solid transparent;}
.mtile:hover{transform:translateY(-4px) scale(1.04);border-color:#FFD700;}
.mtile.done{border-color:#3DAA6B;background:#F0FFF6;}
.mt-em{font-size:28px;display:block;margin-bottom:5px;}
.mt-q{font-size:15px;font-weight:900;color:#E8453C;}
.mt-fa{font-size:11px;color:#999;margin-top:2px;}
.prog-wrap{background:#eee;border-radius:50px;height:10px;margin-bottom:22px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#E8453C,#FFD700);border-radius:50px;transition:width .6s;}
.score-bar{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.schip{background:#fff;border-radius:50px;padding:9px 20px;font-size:15px;font-weight:700;color:#2D1810;box-shadow:0 4px 12px rgba(0,0,0,.08);display:flex;align-items:center;gap:7px;}
.qcard{background:#fff;border-radius:28px;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:32px 24px;text-align:center;margin-bottom:20px;}
.qem-big{font-size:76px;display:block;margin-bottom:6px;animation:wiggle 2s infinite;}
.qtext{font-size:19px;color:#666;margin-bottom:22px;font-weight:700;}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.qob{background:#f5f5f5;border:3px solid #eee;border-radius:18px;padding:18px 12px;font-family:'Vazirmatn',sans-serif;font-size:18px;font-weight:700;color:#2D1810;cursor:pointer;transition:.2s;}
.qob:hover{transform:scale(1.05);border-color:#3A7BD5;}
.qob.cor{background:#D5F5E3;border-color:#3DAA6B;color:#3DAA6B;animation:cbounce .5s;}
.qob.wrg{background:#FADBD8;border-color:#E8453C;color:#E8453C;animation:shake .4s;}
@keyframes cbounce{0%{transform:scale(1);}50%{transform:scale(1.15);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.fbub{display:none;margin:14px auto;padding:13px 22px;border-radius:50px;font-size:17px;font-weight:700;max-width:340px;}
.fbub.show{display:block;animation:popIn .4s;}
.fbub.yay{background:#D5F5E3;color:#3DAA6B;}
.fbub.nay{background:#FADBD8;color:#E8453C;}
.nxbtn{display:none;margin:12px auto 0;background:linear-gradient(135deg,#3A7BD5,#2980B9);border:none;border-radius:50px;padding:13px 32px;color:#fff;font-family:'Vazirmatn',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:.2s;}
.nxbtn:hover{transform:scale(1.07);}
.nxbtn.show{display:inline-block;animation:popIn .3s;}
.phrase-card{background:linear-gradient(135deg,#E8453C,#B03028);border-radius:20px;padding:18px;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.2s;box-shadow:0 6px 20px rgba(232,69,60,.3);}
.phrase-card:nth-child(3n+2){background:linear-gradient(135deg,#3A7BD5,#2471A3);}
.phrase-card:nth-child(3n){background:linear-gradient(135deg,#3DAA6B,#1E8449);}
.phrase-card:hover{transform:translateX(-4px) scale(1.02);}
.ph-em{font-size:34px;flex-shrink:0;}
.ph-info{flex:1;text-align:right;}
.ph-q{font-size:20px;font-weight:900;}
.ph-fa{font-size:13px;opacity:.85;margin-top:2px;}
.ph-btn{background:rgba(255,255,255,.25);border:none;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;transition:.2s;flex-shrink:0;}
.alpha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:10px;margin-bottom:20px;}
.atile{background:#fff;border-radius:18px;padding:18px 8px;text-align:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.07);transition:.2s;border:3px solid #E8453C;}
.atile:nth-child(4n+2){border-color:#3A7BD5;}
.atile:nth-child(4n+3){border-color:#3DAA6B;}
.atile:nth-child(4n){border-color:#FF8C42;}
.atile:hover{transform:scale(1.1);}
.al{font-size:38px;font-weight:900;color:#2D1810;}
.ar{font-size:11px;color:#bbb;margin-top:3px;}
.adetail{display:none;background:#fff;border-radius:22px;padding:26px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:popIn .3s;margin-bottom:18px;}
.abig{font-size:76px;font-weight:900;color:#E8453C;}
.aex{font-size:17px;color:#555;margin-top:10px;}
.cf{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;animation:cfFall 1.5s ease-in forwards;z-index:9999;}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
@media(max-width:540px){.qword{font-size:40px;}.qopts{grid-template-columns:1fr;}.mini-grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<div class="bg-pattern" id="bgPat"></div>
<header>
<div class="kilim"></div>
<div class="hdr">
<div class="logo"><span class="logo-em">🏕️</span><div class="logo-text"><h1>QashqAI Voice — ۱۰۰ کلمه</h1><p>اولین فرهنگ لغت تعاملی زبان قشقایی</p></div></div>
<div class="stars-box"><span class="star-spin">⭐</span><span id="starCount">0</span></div>
</div>
</header>
<nav>
<button class="nb active" onclick="goTab('words',this)"><span class="nb-em">🗣️</span>کلمات</button>
<button class="nb" onclick="goTab('talk',this)"><span class="nb-em">💬</span>مکالمه</button>
<button class="nb" onclick="goTab('alpha',this)"><span class="nb-em">✏️</span>الفبا</button>
<button class="nb" onclick="goTab('quiz',this)"><span class="nb-em">🎯</span>آزمون</button>
</nav>
<main>
<div id="tab-words" class="tc active">
<div class="sec-head"><h2>۱۰۰ کلمه قشقایی 🌟</h2><p>دسته‌بندی رو انتخاب کن</p></div>
<div class="cat-bar" id="catBar"></div>
<div class="prog-wrap"><div class="prog-fill" id="wProg" style="width:1%"></div></div>
<div class="lcard">
<span class="card-em" id="cEm">👨</span>
<div class="qword" id="cWord">آتا</div>
<div class="phonetic" id="cPh">[ata]</div>
<div class="trans-row">
<div class="tp"><span class="tl">فارسی</span><span class="tw" id="cFa">پدر</span></div>
<div class="tp"><span class="tl">Deutsch</span><span class="tw" id="cDe">Vater</span></div>
<div class="tp"><span class="tl">English</span><span class="tw" id="cEn">Father</span></div>
</div>
<button class="speak-btn" id="spkBtn" onclick="speakCur()">🔊 بگو!</button>
<div class="nav-arr">
<button class="arr p" onclick="prevW()">←</button>
<span class="wctr" id="wCtr">1 / 100</span>
<button class="arr n" onclick="nextW()">→</button>
</div>
</div>
<h3 style

<title>QashqAI Voice - 100 Qashqai Words</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a0a00, #3d1a00);
    min-height: 100vh;
    color: white;
    padding: 20px;
  }
  header {
    text-align: center;
    padding: 30px 20px;
    border-bottom: 2px solid #c8860a;
    margin-bottom: 30px;
  }
  header h1 {
    font-size: 2em;
    color: #f0a500;
    margin-bottom: 8px;
  }
  header p {
    color: #ccc;
    font-size: 0.95em;
  }
  .search-box {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
  }
  .search-box input {
    width: 100%;
    max-width: 500px;
    padding: 12px 20px;
    border-radius: 30px;
    border: 2px solid #c8860a;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 1em;
    outline: none;
  }
  .search-box input::placeholder { color: #aaa; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid #c8860a44;
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    transition: transform 0.2s, background 0.2s;
    cursor: pointer;
  }
  .card:hover {
    background: rgba(200,134,10,0.2);
    transform: translateY(-3px);
  }
  .card .number {
    font-size: 0.75em;
    color: #c8860a;
    margin-bottom: 6px;
  }
  .card .qashqai {
    font-size: 1.4em;
    font-weight: bold;
    color: #f0a500;
    margin-bottom: 6px;
  }
  .card .persian {
    font-size: 0.9em;
    color: #ddd;
    margin-bottom: 4px;
    direction: rtl;
  }
  .card .german {
    font-size: 0.85em;
    color: #aaa;
    margin-bottom: 4px;
  }
  .card .english {
    font-size: 0.8em;
    color: #888;
    margin-bottom: 12px;
  }
  .speak-btn {
    background: linear-gradient(135deg, #c8860a, #f0a500);
    border: none;
    border-radius: 20px;
    padding: 8px 20px;
    color: white;
    font-size: 0.9em;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s;
  }
  .speak-btn:hover { opacity: 0.85; }
  .speak-btn:active { opacity: 0.7; }
  .speak-btn.playing {
    background: linear-gradient(135deg, #0a8c4a, #0fc96d);
  }
  footer {
    text-align: center;
    margin-top: 50px;
    padding: 20px;
    color: #888;
    font-size: 0.85em;
    border-top: 1px solid #c8860a44;
  }
  footer span { color: #f0a500; }
</style>
</head>
<body>

<header>
  <h1>🎙️ QashqAI Voice</h1>
  <p>100 Qashqai Words for Children | ۱۰۰ کلمه قشقایی برای کودکان</p>
  <p style="margin-top:6px; font-size:0.85em; color:#c8860a;">🔊 Press the button to hear the word | دکمه را فشار دهید تا صدا را بشنوید</p>
</header>

<div class="search-box">

<footer>
  <p>© 2025 <span>QashqAI Voice</span> — Preserving the Qashqai Language through Ethical AI</p>
  <p style="margin-top:6px;">🌍 qashqaivoice.com</p>

function speak(word, btn) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'tr-TR';
    utter.rate = 0.85;
    utter.pitch = 1;
    btn.classList.add('playing');
    btn.textContent = '🔊 Playing...';
    utter.onend = () => {
      btn.classList.remove('playing');
      btn.textContent = '▶ Listen / بشنو';
    };
    utter.onerror = () => {
      btn.classList.remove('playing');
      btn.textContent = '▶ Listen / بشنو';
    };
    window.speechSynthesis.speak(utter);
  } else {
    alert('Your browser does not support text-to-speech.');
  }
}

function renderCards(list) {
  const grid = document.getElementById('wordGrid');
  grid.innerHTML = '';
  list.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="number">#${words.indexOf(w)+1}</div>
      <div class="qashqai">${w.q}</div>
      <div class="persian">${w.p}</div>
      <div class="german">🇩🇪 ${w.g}</div>
      <div class="english">🇬🇧 ${w.e}</div>
      <button class="speak-btn" onclick="speak('${w.q}', this)">▶ Listen / بشنو</button>
    `;
    grid.appendChild(card);
  });
}

function filterWords() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = words.filter(w =>
    w.q.toLowerCase().includes(q) ||
    w.p.includes(q) ||
    w.g.toLowerCase().includes(q) ||
    w.e.toLowerCase().includes(q)
  );
  renderCards(filtered);
}

renderCards(words);

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QashqAI Voice – 100 Qashqai Words for Children</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f8f4e8;
      color:#333;
      text-align:center;
    }
    header{
      background:#d9534f;
      color:white;
      padding:20px;
      font-size:24px;
      font-weight:bold;
    }
    .container{
      max-width:700px;
      margin:30px auto;
      padding:20px;
    }
    .card{
      background:white;
      border-radius:20px;
      padding:30px 20px;
      box-shadow:0 4px 14px rgba(0,0,0,0.1);
    }
    .emoji{
      font-size:50px;
      margin-bottom:10px;
    }
    .word{
      font-size:42px;
      color:#c94c4c;
      font-weight:bold;
      margin:10px 0;
    }
    .phonetic{
      color:#777;
      margin-bottom:20px;
      font-style:italic;
    }
    .translations{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:20px;
    }
    .box{
      background:#f4f4f4;
      padding:12px;
      border-radius:12px;
      font-size:16px;
    }
    .label{
      display:block;
      font-size:12px;
      color:#777;
      margin-bottom:6px;
    }
    .nav{
      margin-top:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:15px;
    }
    button{
      border:none;
      background:#d9534f;
      color:white;
      padding:10px 18px;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
    }
    button:hover{
      background:#b6403d;
    }
    .counter{
      font-weight:bold;
      color:#555;
    }
  </style>
</head>
<body>
  <header>QashqAI Voice – 100 واژه قشقایی برای کودکان</header>

  <div class="container">
    <div class="card">
      <div class="emoji" id="emoji">👨</div>
      <div class="word" id="qashqaiWord">آتا</div>
      <div class="phonetic" id="phonetic">/ata/</div>

      <div class="translations">
        <div class="box">
          <span class="label">فارسی</span>
          <span id="faWord">پدر</span>
        </div>
        <div class="box">
          <span class="label">English</span>
          <span id="enWord">Father</span>
        </div>
        <div class="box">
          <span class="label">Deutsch</span>
          <span id="deWord">Vater</span>
        </div>
        <div class="box">
          <span class="label">موضوع</span>
          <span id="catWord">خانواده</span>
        </div>
      </div>

      <div class="nav">
        <button onclick="prevWord()">قبلی</button>
        <span class="counter" id="counter">1 / 10</span>
        <button onclick="nextWord()">بعدی</button>
      </div>
    </div>
  </div>

  <script>
    const words = [
      { emoji:"👨", qashqai:"آتا", phonetic:"/ata/", fa:"پدر", en:"Father", de:"Vater", cat:"خانواده" },
      { emoji:"👩", qashqai:"آنا", phonetic:"/ana/", fa:"مادر", en:"Mother", de:"Mutter", cat:"خانواده" },
      { emoji:"👦", qashqai:"اوغلان", phonetic:"/oğlan/", fa:"پسر", en:"Boy", de:"Junge", cat:"خانواده" },
      { emoji:"👧", qashqai:"قیز", phonetic:"/qız/", fa:"دختر", en:"Girl", de:"Mädchen", cat:"خانواده" },
      { emoji:"🐴", qashqai:"آت", phonetic:"/at/", fa:"اسب", en:"Horse", de:"Pferd", cat:"حیوانات" },
      { emoji:"🐑", qashqai:"قویون", phonetic:"/qoyun/", fa:"گوسفند", en:"Sheep", de:"Schaf", cat:"حیوانات" },
      { emoji:"🐐", qashqai:"کچی", phonetic:"/keçi/", fa:"بز", en:"Goat", de:"Ziege", cat:"حیوانات" },
      { emoji:"☀️", qashqai:"گونش", phonetic:"/güneş/", fa:"خورشید", en:"Sun", de:"Sonne", cat:"طبیعت" },
      { emoji:"🌙", qashqai:"آی", phonetic:"/ay/", fa:"ماه", en:"Moon", de:"Mond", cat:"طبیعت" },
      { emoji:"💧", qashqai:"سو", phonetic:"/su/", fa:"آب", en:"Water", de:"Wasser", cat:"طبیعت" }
    ];

    let currentIndex = 0;

    function renderWord() {
      const w = words[currentIndex];
      document.getElementById("emoji").textContent = w.emoji;
      document.getElementById("qashqaiWord").textContent = w.qashqai;
      document.getElementById("phonetic").textContent = w.phonetic;
      document.getElementById("faWord").textContent = w.fa;
      document.getElementById("enWord").textContent = w.en;
      document.getElementById("deWord").textContent = w.de;
      document.getElementById("catWord").textContent = w.cat;
      document.getElementById("counter").textContent = ${currentIndex + 1} / ${words.length};
    }

    function nextWord() {
      currentIndex = (currentIndex + 1) % words.length;
      renderWord();
    }

    function prevWord() {
      currentIndex = (currentIndex - 1 + words.length) % words.length;
      renderWord();
    }

    renderWord();
  </script>
</body>
</html>
